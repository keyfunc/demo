name: Deploy Server

on:
  push:
    branches:
      - master

env:
  ALIYUN_REGISTRY: registry.cn-hangzhou.aliyuncs.com # 阿里云镜像仓库地址
  ALIYUN_IMAGE: registry.cn-hangzhou.aliyuncs.com/keyfu/storely # 阿里云镜像地址
  SERVICE_DIR: /data/service/demo # 服务器工作目录

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login ACR
        run: |
          echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login "${{ env.ALIYUN_REGISTRY }}" \
            --username "${{ secrets.ALIYUN_REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Build and push image
        run: |
          docker build -t "${{ env.ALIYUN_IMAGE }}:latest" .
          docker push "${{ env.ALIYUN_IMAGE }}:latest"

      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd "${{ env.SERVICE_DIR }}"

            test -f compose.yml
            test -f nginx.conf
            test -f .env

            echo "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}" | docker login "${{ env.ALIYUN_REGISTRY }}" \
              --username "${{ secrets.ALIYUN_REGISTRY_USERNAME }}" \
              --password-stdin

            docker compose -f compose.yml pull server_api
            docker compose -f compose.yml up -d --remove-orphans
            docker image prune -f
