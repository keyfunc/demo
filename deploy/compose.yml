services:
  nginx: # nginx 容器
    image: nginx:1.27-alpine
    container_name: server-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # 宿主机 config 映射到容器内
    depends_on:
      - server_api
  
  redis: # redis 容器
    image: redis:8.6.4-alpine
    container_name: server_redis
    restart: always
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  postgres: # postgres 容器
    image: postgres:15.17-alpine3.22
    container_name: server_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  server_api: # api 容器(拉取阿里云镜像仓库镜像)
    image: registry.cn-hangzhou.aliyuncs.com/keyfu/storely:latest
    container_name: server-api
    restart: always
    environment:
      SERVICE_NAME: ${SERVICE_NAME}
      SERVER_PORT: ${SERVER_PORT}
      LOGGER_LEVEL: ${LOGGER_LEVEL}
      LOGGER_FORMAT: ${LOGGER_FORMAT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
    depends_on:
      - postgres
      - redis
  
volumes:
  pg_data:
  redis_data:
